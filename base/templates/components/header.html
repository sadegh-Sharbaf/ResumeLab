<header class="site-header">
    <div class="container header-inner">
        <a class="brand" href="{% url 'personalapp:home' %}" aria-label="صفحه اصلی">
            <span class="brand-mark">R</span>
            <span>Resume<span class="gradient-text">Lab</span></span>
        </a>
        <button class="mobile-toggle" type="button" data-menu-toggle aria-label="باز کردن منو" aria-expanded="false">☰</button>
        <nav class="main-nav" data-main-menu>
            <a href="{% url 'personalapp:home' %}">خانه</a>
            <a href="{% url 'resumes:explore' %}">رزومه‌ها</a>
            <a href="{% url 'personalapp:about' %}">درباره پروژه</a>
            {% if site_featured_resume %}<a href="{{ site_featured_resume.get_absolute_url }}">رزومه من</a>{% endif %}
            {% if request.user.is_authenticated %}
                <a href="{% url 'resumes:dashboard' %}">داشبورد</a>
                <a href="{% url 'accounts:profile' %}">حساب</a>
                <form method="post" action="{% url 'accounts:logout' %}" class="inline-form">
                    {% csrf_token %}<button class="nav-button" type="submit">خروج</button>
                </form>
            {% else %}
                <a href="{% url 'accounts:login' %}">ورود</a>
                <a class="nav-cta" href="{% url 'accounts:register' %}">ساخت رزومه</a>
            {% endif %}
            <button class="theme-toggle" type="button" data-theme-toggle aria-label="تغییر تم">◐</button>
        </nav>
    </div>
</header>
