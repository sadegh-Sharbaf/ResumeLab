{% extends 'base.html' %}
{% block title %}آپلود سریع{% endblock %}
{% block content %}<div class="container page-shell"><div class="surface card" style="max-width:620px;margin:auto"><h1>آپلود سریع فایل</h1><p class="muted" style="margin:10px 0 22px">ابزار شخصی انتقال سریع فایل روی شبکه محلی.</p>{% if success %}<div class="message message-success" style="position:static;margin-bottom:18px">فایل {{ filename }} ذخیره شد.</div>{% endif %}<form method="post" enctype="multipart/form-data">{% csrf_token %}<div class="field"><label for="file">فایل</label><input class="form-control" id="file" type="file" name="file" required></div><button class="btn btn-primary" style="margin-top:18px" type="submit">آپلود</button></form></div></div>{% endblock %}
